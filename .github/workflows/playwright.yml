name: Playwright Tests
permissions:
  contents: write

on:
  push:
    branches: [ gangesh ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to run (example: @smoke)"
        required: false
        default: ""

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: |
        npm ci
        npm install -D allure-commandline allure-playwright

    - name: Install Java (Required for Allure)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Clean old reports
      run: rm -rf allure-results allure-report

    - name: Run Playwright tests
      run: |
        TAG="${{ github.event.inputs.tag }}"
        if [ -z "$TAG" ]; then
          echo "Running all tests"
          npx playwright test
        else
          echo "Running tests with tag: $TAG"
          npx playwright test --grep "$TAG"
        fi

    - name: List allure-results contents
      run: |
        if [ -d "allure-results" ]; then
          echo "Allure results contents:"
          ls -lR allure-results
        else
          echo "No allure-results folder found"
          exit 1
        fi

    - name: Validate Allure JSON
      run: |
        if ls allure-results/*.json 1> /dev/null 2>&1; then
          echo "JSON files found ✅"
        else
          echo "No JSON files found ❌"
          exit 1
        fi

    - name: Generate Allure Report
      run: |
        npx allure-commandline generate allure-results --clean -o allure-report

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Download Allure Report Artifact
      uses: actions/download-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report