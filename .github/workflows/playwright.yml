name: Playwright Tests

on:
  push:
    branches: [ gangesh ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to run @smoke"
        required: false
        default: "@smoke"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: |
        npm ci
        npm install -D allure-commandline allure-playwright  # install allure deps before tests

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests with tag
      run: |
        TAG="${{ github.event.inputs.tag }}"
        TAG=${TAG:-"@smoke"}

        echo "Running tests with tag: $TAG"
        npx playwright test --grep "$TAG"

    - name: Generate Allure Report
      if: always()
      run: |
        if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
          npx allure generate allure-results --clean -o allure-report
        else
          echo "No allure-results found or folder is empty, skipping report generation"
        fi

    - name: List allure-results contents
      run: |
        if [ -d "allure-results" ]; then
         ls -lR allure-results
        else
         echo "No allure-results folder found"
        fi

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30